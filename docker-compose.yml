version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: link-prediction-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PRODUCTION_MODEL=random_forest_ensemble
    volumes:
      - ./models:/app/models
      - ./features:/app/features
      - ./data:/app/data
      - ./train.csv:/app/train.csv
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
